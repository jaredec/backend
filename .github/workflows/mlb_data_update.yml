name: MLB Scorigami Data Updater

on:
  workflow_dispatch:
  schedule:
    - cron: '0 13 * * *'

jobs:
  update-mlb-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List files in repository root
        run: ls -la

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ---- START NEW NETWORK TEST STEP ----
      - name: Test network connectivity to Supabase
        run: |
          echo "Attempting to connect to ${{ secrets.DB_HOST }} on port ${{ secrets.DB_PORT }}"
          nc -zv ${{ secrets.DB_HOST }} ${{ secrets.DB_PORT }}
      # ---- END NEW NETWORK TEST STEP ----

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run MLB Scorigami script
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
        run: python fetch_daily_gamelogs.py

      - name: Refresh materialized views
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
        run: |
          python -c "
          import psycopg2, os
          conn = psycopg2.connect(host=os.environ['DB_HOST'], port=os.environ.get('DB_PORT','5432'), dbname=os.environ['DB_NAME'], user=os.environ['DB_USER'], password=os.environ['DB_PASSWORD'])
          conn.autocommit = True
          cur = conn.cursor()
          cur.execute('REFRESH MATERIALIZED VIEW scorigami_by_year')
          cur.execute('REFRESH MATERIALIZED VIEW scorigami_by_year_ha')
          conn.close()
          print('Materialized views refreshed.')
          "
